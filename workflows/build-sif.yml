name: Build PyTorch SIF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install -y apptainer
          apptainer --version

      - name: Build SIF from PyTorch Docker image
        run: |
          apptainer pull pytorch_2.7_cuda12.sif docker://pytorch/pytorch:2.7.1-cuda12.6-cudnn9-devel
          ls -lh pytorch_2.7_cuda12.sif

      - name: Upload SIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytorch_2.7_cuda12_sif
          path: pytorch_2.7_cuda12.sif
          retention-days: 7
